<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Admin Login – MelaninGold Organic</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css?v=20250601-logo">
  <style>
    /* ── Login page ── */
    body { background: var(--black); }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle radial glow behind the card */
    .login-glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse,
        rgba(201,148,58,0.10) 0%,
        rgba(201,148,58,0.03) 40%,
        transparent 70%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--charcoal);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px 40px 44px;
    }
    @media (max-width: 480px) { .login-card { padding: 36px 24px 32px; } }

    .login-logo {
      display: block;
      margin: 0 auto 36px;
      height: 48px;
      width: auto;
      filter: brightness(1.1) drop-shadow(0 1px 8px rgba(201,148,58,0.22));
    }

    .login-title {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: 28px;
      color: var(--white);
      text-align: center;
      margin-bottom: 6px;
    }
    .login-title em { font-style: italic; color: var(--gold-light); }

    .login-subtitle {
      font-size: 13px;
      font-weight: 300;
      color: var(--muted);
      text-align: center;
      margin-bottom: 36px;
    }

    .login-divider {
      width: 40px; height: 1px;
      background: var(--gold);
      margin: 0 auto 36px;
    }

    /* Form fields re-use global .form-group / .form-label / .form-input */
    .login-btn {
      width: 100%;
      height: 52px;
      background: var(--gold);
      color: var(--black);
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--duration), border-color var(--duration);
      margin-top: 8px;
    }
    .login-btn:hover { background: var(--gold-light); border-color: var(--gold-light); }
    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .login-error {
      display: none;
      background: rgba(220,50,50,0.1);
      border: 1px solid rgba(220,50,50,0.35);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 13px;
      color: #f08080;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .login-error.show { display: block; }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--gold-dim);
    }
    .login-footer a {
      color: var(--gold-dim);
      transition: color var(--duration);
    }
    .login-footer a:hover { color: var(--gold-light); }

    /* Show/hide password toggle */
    .input-eye-wrap { position: relative; }
    .input-eye-wrap .form-input { padding-right: 44px; }
    .eye-btn {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color var(--duration);
    }
    .eye-btn:hover { color: var(--gold-light); }
  </style>
</head>
<body>

<div class="login-glow"></div>

<main class="login-wrap" role="main">
  <div class="login-card">

    <img src="../assets/images/branding/logo-nav.webp"
         alt="MelaninGold Organic"
         class="login-logo"
         width="216" height="144"
         loading="eager">

    <h1 class="login-title">Admin <em>Portal</em></h1>
    <p class="login-subtitle">Sign in to manage your store</p>
    <div class="login-divider"></div>

    <!-- Error message -->
    <div class="login-error" id="login-error" role="alert"></div>

    <form id="login-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input
          class="form-input"
          type="email"
          id="login-email"
          autocomplete="email"
          placeholder="your@email.com"
          required
          autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="input-eye-wrap">
          <input
            class="form-input"
            type="password"
            id="login-password"
            autocomplete="current-password"
            placeholder="Enter your password"
            required>
          <button type="button" class="eye-btn" id="eye-toggle" aria-label="Show password">
            <!-- Eye icon -->
            <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye-off icon (hidden by default) -->
            <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5"
                 style="display:none;">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8
                       a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4
                       c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07
                       a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        Sign In
      </button>

    </form>

    <div class="login-footer">
      <a href="../index.html">← Back to website</a>
    </div>

  </div>
</main>

<script>
/* ── MelaninGold Admin Auth ──
   Email: bngie@umojaserv.com
   Password hash stored below — change via admin portal settings.
   ─────────────────────────────────────────────────────────────── */
(function () {

  const ADMIN_EMAIL    = 'bngie@umojaserv.com';
  const SESSION_KEY    = 'mg_admin_session';
  const SESSION_EXPIRY = 8 * 60 * 60 * 1000; // 8 hours

  /* ── SHA-256 via Web Crypto API ── */
  async function sha256(str) {
    const buf = await crypto.subtle.digest(
      'SHA-256',
      new TextEncoder().encode(str)
    );
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
  }

  /* ── Stored password hash ──
     Default password: MelaninAdmin2024
     To change: update MG_ADMIN_PASS_HASH in localStorage via browser console:
       localStorage.setItem('mg_admin_pass_hash', await sha256('YourNewPassword'));
  ── */
  const DEFAULT_HASH = '2cf715960c60531f24976790d25cb0b2b55b279dd06e8eebf4d6c8c1d1c3b871';
  // ^ SHA-256 of "MelaninAdmin2024" — change via browser console: localStorage.setItem('mg_admin_pass_hash', await sha256('YourNewPassword'))

  function getStoredHash() {
    return localStorage.getItem('mg_admin_pass_hash') || DEFAULT_HASH;
  }

  /* ── Check if already logged in ── */
  function isLoggedIn() {
    try {
      const s = JSON.parse(sessionStorage.getItem(SESSION_KEY));
      if (!s) return false;
      if (Date.now() > s.expires) {
        sessionStorage.removeItem(SESSION_KEY);
        return false;
      }
      return s.email === ADMIN_EMAIL;
    } catch { return false; }
  }

  /* If already logged in, redirect straight to admin */
  if (isLoggedIn()) {
    window.location.replace('admin.html');
    return;
  }

  /* ── DOM refs ── */
  const form     = document.getElementById('login-form');
  const emailEl  = document.getElementById('login-email');
  const passEl   = document.getElementById('login-password');
  const errEl    = document.getElementById('login-error');
  const btnEl    = document.getElementById('login-btn');
  const eyeBtn   = document.getElementById('eye-toggle');
  const eyeOpen  = document.getElementById('eye-open');
  const eyeClosed= document.getElementById('eye-closed');

  /* ── Show/hide password ── */
  eyeBtn.addEventListener('click', () => {
    const show = passEl.type === 'password';
    passEl.type = show ? 'text' : 'password';
    eyeOpen.style.display  = show ? 'none'  : 'block';
    eyeClosed.style.display= show ? 'block' : 'none';
    eyeBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  });

  /* ── Show error ── */
  function showError(msg) {
    errEl.textContent = msg;
    errEl.classList.add('show');
    btnEl.disabled = false;
    btnEl.textContent = 'Sign In';
  }

  /* ── Form submit ── */
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.classList.remove('show');

    const email = emailEl.value.trim().toLowerCase();
    const pass  = passEl.value;

    if (!email || !pass) {
      showError('Please enter your email and password.');
      return;
    }

    btnEl.disabled = true;
    btnEl.textContent = 'Signing in…';

    /* Small artificial delay for UX (prevents timing attacks) */
    await new Promise(r => setTimeout(r, 500));

    /* Check email */
    if (email !== ADMIN_EMAIL) {
      showError('Incorrect email or password. Please try again.');
      return;
    }

    /* Hash and check password */
    const hash = await sha256(pass);
    if (hash !== getStoredHash()) {
      showError('Incorrect email or password. Please try again.');
      return;
    }

    /* ✓ Auth success — write session */
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({
      email:   ADMIN_EMAIL,
      expires: Date.now() + SESSION_EXPIRY
    }));

    btnEl.textContent = 'Redirecting…';

    /* Redirect to admin */
    const dest = new URLSearchParams(location.search).get('next') || 'admin.html';
    window.location.replace(dest);
  });

  /* Clear error on input */
  [emailEl, passEl].forEach(el =>
    el.addEventListener('input', () => errEl.classList.remove('show'))
  );

})();
</script>
</body>
</html>
